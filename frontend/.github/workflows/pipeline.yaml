name: CI Pipeline

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

  steps:
    - name: Checkout code
      uses: actions/checkout@5

    - name: setting node.js
      uses: actions/setup-node@v3
      with:
        node-version: 16

    - name: install packages
      run: npm install

    - name: run tests
      run: npm run build
